<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vocus Social — Month in Review</title>
<style>
:root{
  --vocus-blue:#020E92;
  --vocus-blue-dark:#0F1C47;
  --vocus-blue-3:#4E56B3;
  --vocus-blue-2:#9A9FD3;
  --vocus-blue-1:#E6E7F4;
  --vocus-yellow:#FFCC00;
  --vocus-orange:#FF8B2F;
  --vocus-magenta:#FF4DD7;
  --vocus-green:#4DFF4D;
  --vocus-teal:#00FFFF;
  --vocus-grey:#F1F0EE;
  --ink:#0A1240;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:"Moderat","Moderat Trial",Arial,"Helvetica Neue",Helvetica,sans-serif;
  background:var(--vocus-grey);
  color:#fff;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  min-height:100vh;
}
img{image-rendering:-webkit-optimize-contrast;image-rendering:auto}
.logo img,.footer-logo img{
  image-rendering:-webkit-optimize-contrast;
  image-rendering:auto;
  -webkit-backface-visibility:hidden;
  transform:translateZ(0);
}
button{font-family:inherit;cursor:pointer;border:0}

/* ---------- TOP TOOLBAR ---------- */
.toolbar{
  position:sticky;top:0;z-index:50;
  background:var(--vocus-blue);
  border-bottom:1px solid rgba(255,255,255,.1);
  padding:12px 24px;display:flex;gap:10px;align-items:center;
}
.toolbar .brand{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;font-size:14px;letter-spacing:.02em;margin-right:auto}
.toolbar .brand .dot{width:18px;height:18px;border-radius:50%;background:var(--vocus-teal)}
.toolbar button{
  padding:9px 16px;border-radius:999px;
  background:#fff;color:var(--vocus-blue);font-weight:600;font-size:13px;
  display:inline-flex;gap:8px;align-items:center;
}
.toolbar button.ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3)}
.toolbar button.primary{background:var(--vocus-teal);color:var(--vocus-blue-dark)}
.toolbar button:hover{transform:translateY(-1px)}

/* ---------- DASHBOARD CONTAINER ---------- */
.dashboard{
  width:1280px;max-width:100%;
  margin:24px auto 80px;
  background:var(--vocus-blue);
  border-radius:14px;overflow:hidden;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.page{padding:60px 64px;position:relative;overflow:hidden;color:#fff;background:var(--vocus-blue)}
.page + .page{border-top:1px solid rgba(255,255,255,.08)}
.page.light{background:#fff;color:var(--ink)}
.page.light h1,.page.light h2,.page.light h3{color:var(--vocus-blue)}

.eyebrow{
  font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  font-weight:700;opacity:.8;margin-bottom:14px;
  display:inline-flex;align-items:center;gap:10px;
}
.eyebrow::before{content:"";width:32px;height:2px;background:var(--vocus-teal)}
.page.light .eyebrow::before{background:var(--vocus-magenta)}
h1.title{font-size:64px;line-height:1.02;font-weight:800;letter-spacing:-.02em}
h2.section-title{font-size:36px;line-height:1.1;font-weight:800;letter-spacing:-.015em;margin-bottom:6px}
.section-sub{font-size:15px;opacity:.8;max-width:620px;margin-bottom:32px;line-height:1.5}

/* ---------- LOGO ---------- */
.logo{display:flex;align-items:center;gap:12px}
.logo img{height:40px;width:auto;display:block}
.footer-logo img{height:30px;width:auto;display:block}

/* ---------- COVER PAGE ---------- */
.cover{padding:72px 64px 56px;min-height:760px}
.cover-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:60px}
.report-meta{text-align:right;font-size:13px;opacity:.85;line-height:1.6}
.report-meta strong{font-weight:700}

.cover-hero{position:relative;z-index:2}
.cover-hero h1.title{max-width:820px}
.cover-hero h1.title em{font-style:normal;color:var(--vocus-teal)}
.cover-month{display:flex;align-items:baseline;gap:18px;margin-top:24px;font-size:22px;font-weight:600;flex-wrap:wrap}
.cover-month .pill{background:var(--vocus-teal);color:var(--vocus-blue);padding:7px 18px;border-radius:999px;font-size:14px;font-weight:700;letter-spacing:.04em}
.cover-month .pill.baseline{background:var(--vocus-yellow)}

.cover-strapline{margin-top:36px;max-width:680px;font-size:18px;line-height:1.5;opacity:.92;font-weight:400}

/* hero metrics strip */
.hero-stats{
  margin-top:48px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;
  position:relative;z-index:2;
}
.stat{
  background:var(--vocus-blue-dark);
  border-radius:14px;padding:22px 20px;
  position:relative;overflow:hidden;
}
.stat::before{content:"";position:absolute;left:0;top:0;width:6px;height:100%;background:var(--accent,var(--vocus-teal))}
.stat .label{font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.75;font-weight:700;padding-left:6px}
.stat .num{font-size:38px;font-weight:800;letter-spacing:-.02em;margin-top:6px;line-height:1.05;padding-left:6px}
.stat .meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;opacity:.85;padding-left:6px;flex-wrap:wrap;min-height:22px}
.delta{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-weight:700;font-size:11px}
.delta.up{background:var(--vocus-green);color:var(--vocus-blue-dark)}
.delta.down{background:var(--vocus-magenta);color:#fff}
.delta.flat{background:rgba(255,255,255,.18);color:#fff}
.baseline-tag{
  display:inline-block;padding:3px 10px;border-radius:999px;
  background:rgba(255,204,0,.22);color:var(--vocus-yellow);
  font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
}

/* metric key / explainer */
.metric-key{
  margin-top:28px;padding:22px 24px;
  background:var(--vocus-blue-dark);border-radius:14px;
  border:1px solid rgba(255,255,255,.08);
}
.metric-key .key-eyebrow{
  font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
  font-weight:700;color:var(--vocus-teal);margin-bottom:14px;
}
.metric-key .key-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:22px;
}
.metric-key .key-item .key-term{
  font-size:13px;font-weight:800;color:#fff;margin-bottom:4px;
}
.metric-key .key-item .key-def{
  font-size:12px;line-height:1.5;color:rgba(255,255,255,.72);font-weight:400;
}
.metric-key .key-item .key-def strong{color:#fff;font-weight:700}
@media (max-width:980px){
  .metric-key .key-grid{grid-template-columns:1fr 1fr}
}

/* ---------- CHANNELS PAGE ---------- */
.channels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:36px}
.channel-card{
  background:#fff;color:var(--ink);
  border-radius:18px;padding:24px;
  position:relative;overflow:hidden;
}
.channel-card .ch-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.channel-card .ch-icon{
  width:46px;height:46px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  background:var(--vocus-blue);color:#fff;
}
.channel-card .ch-icon svg{width:24px;height:24px}
.channel-card.ig .ch-icon{background:var(--vocus-magenta)}
.channel-card.yt .ch-icon{background:var(--vocus-orange)}
.channel-card .ch-name{font-size:18px;font-weight:800}
.channel-card .ch-handle{font-size:12px;color:var(--vocus-blue-3);font-weight:600}
.channel-card .big-num{font-size:42px;font-weight:800;letter-spacing:-.02em;color:var(--vocus-blue);line-height:1}
.channel-card .big-num-label{font-size:11px;text-transform:uppercase;letter-spacing:.15em;color:var(--vocus-blue-3);font-weight:700;margin-top:6px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.channel-card .ch-stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:18px;padding-top:18px;border-top:1px solid var(--vocus-blue-1)}
.channel-card .ch-stats .v{font-size:20px;font-weight:800;color:var(--vocus-blue)}
.channel-card .ch-stats .l{font-size:11px;color:var(--vocus-blue-3);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;font-weight:700}
.channel-card .spark{margin-top:18px;height:46px}
.channel-card.yt{opacity:.78}

/* mix block (donut + commentary) */
.mix-block{
  background:var(--vocus-blue-dark);
  border-radius:18px;padding:28px;
  display:grid;grid-template-columns:280px 1fr;gap:32px;align-items:center;
}
.mix-block .donut{display:flex;align-items:center;justify-content:center}
.mix-block h3{font-size:18px;font-weight:800;margin-bottom:6px}
.mix-block .sub{font-size:13px;opacity:.7;margin-bottom:18px}
.mix-block .legend{display:flex;flex-direction:column;gap:12px}
.mix-block .lg-row{display:flex;align-items:center;gap:14px}
.mix-block .sw{width:14px;height:14px;border-radius:4px;flex-shrink:0}
.mix-block .lg-row .name{font-size:13px;font-weight:700;flex:1}
.mix-block .lg-row .val{font-size:13px;font-weight:800;font-variant-numeric:tabular-nums}
.mix-block .lg-row .pct{font-size:11px;opacity:.7;font-weight:600;width:50px;text-align:right;font-variant-numeric:tabular-nums}
.mix-block .note{
  margin-top:18px;padding-top:18px;border-top:1px solid rgba(255,255,255,.1);
  font-size:13px;line-height:1.55;color:var(--vocus-teal);font-weight:600;
}

/* ---------- JOURNEY PAGE ---------- */
.journey-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:22px;margin-bottom:32px}
.journey-card{background:var(--vocus-blue-1);color:var(--ink);border-radius:18px;padding:26px}
.journey-card.feature{background:var(--vocus-blue);color:#fff}
.journey-card.feature h3{color:#fff}
.journey-card.feature .headline{color:#fff}
.journey-card.feature p{color:rgba(255,255,255,.9)}
.journey-card.feature .tags{color:var(--vocus-teal);border-color:rgba(255,255,255,.2)}
.journey-card h3{font-size:13px;text-transform:uppercase;letter-spacing:.14em;color:var(--vocus-blue-3);font-weight:700;margin-bottom:8px}
.journey-card .headline{font-size:24px;font-weight:800;color:var(--vocus-blue);line-height:1.18;margin-bottom:14px}
.tags{margin-top:18px;padding-top:18px;border-top:1px solid var(--vocus-blue-2);font-size:12px;color:var(--vocus-blue-3);font-weight:700;letter-spacing:.06em;text-transform:uppercase}

/* dual-line chart channel summary cards */
.channel-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.ch-sum{
  background:#fff;border-radius:10px;padding:12px 14px;
  border-left:4px solid var(--accent);
}
.ch-sum-name{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--vocus-blue-3);font-weight:700;margin-bottom:4px}
.ch-sum-num{font-size:16px;font-weight:800;color:var(--vocus-blue);letter-spacing:-.01em;line-height:1.2}
.ch-sum-meta{font-size:12px;color:var(--vocus-blue-3);margin-top:3px;font-weight:500}
.ch-sum-meta strong{color:var(--accent);font-weight:800}
.chart-explainer{
  margin-top:14px;padding:12px 14px;
  background:var(--vocus-blue-1);border-radius:10px;
  font-size:12px;line-height:1.5;color:var(--vocus-blue-3);font-weight:500;
}
.chart-explainer strong{color:var(--vocus-blue);font-weight:800}

.wins{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.win{
  color:var(--ink);
  background:#fff;
  border-radius:18px;padding:24px;
  position:relative;overflow:hidden;
}
.win::before{content:"";position:absolute;left:0;top:0;width:100%;height:8px;background:var(--accent)}
.win .num{font-size:32px;font-weight:800;color:var(--vocus-blue);margin-bottom:6px;letter-spacing:-.02em;margin-top:6px}
.win .ttl{font-size:15px;font-weight:800;color:var(--vocus-blue);margin-bottom:6px}
.win .body{font-size:13.5px;color:var(--vocus-blue-3);line-height:1.5;font-weight:500}

/* Wins as a feature page (post-Journey) */
.wins-feature{margin-top:32px;gap:22px}
.wins-feature .win{padding:36px 30px;border:1px solid var(--vocus-blue-1)}
.wins-feature .win::before{height:12px}
.wins-feature .win .num{font-size:54px;margin-bottom:12px;margin-top:12px}
.wins-feature .win .ttl{font-size:19px;margin-bottom:10px}
.wins-feature .win .body{font-size:14.5px;line-height:1.6}

/* ---------- CONTENT PAGE ---------- */
.top-posts{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:36px}
.post-card{
  background:#fff;color:var(--ink);
  border-radius:18px;overflow:hidden;
  display:flex;flex-direction:column;
}
.post-card .visual{
  height:170px;position:relative;overflow:hidden;padding:22px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.post-card .visual.blue{background:var(--vocus-blue);color:#fff}
.post-card .visual.teal{background:var(--vocus-teal);color:var(--vocus-blue)}
.post-card .visual.magenta{background:var(--vocus-magenta);color:#fff}
.post-card .visual.yellow{background:var(--vocus-yellow);color:var(--vocus-blue)}
.post-card .visual.orange{background:var(--vocus-orange);color:var(--vocus-blue)}
.post-card .visual.green{background:var(--vocus-green);color:var(--vocus-blue)}
.post-card .v-tag{
  font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-weight:800;
  align-self:flex-start;
}
.post-card .v-label{font-weight:800;font-size:18px;line-height:1.22}
.post-card .body{padding:18px 20px 20px;display:flex;flex-direction:column;gap:8px;flex:1}
.post-card .meta{font-size:11px;color:var(--vocus-blue-3);text-transform:uppercase;letter-spacing:.12em;font-weight:700}
.post-card .copy{font-size:14px;line-height:1.45;color:var(--ink);font-weight:500;flex:1}
.post-card .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding-top:14px;border-top:1px solid var(--vocus-blue-1);margin-top:6px}
.post-card .stats .s{display:flex;flex-direction:column}
.post-card .stats .v{font-size:18px;font-weight:800;color:var(--vocus-blue);letter-spacing:-.01em}
.post-card .stats .l{font-size:10px;color:var(--vocus-blue-3);text-transform:uppercase;letter-spacing:.1em;font-weight:700}

/* format performance */
.format-block{
  background:var(--vocus-blue-dark);
  border-radius:18px;padding:24px 28px;
}
.format-block .chart-head{display:flex;justify-content:space-between;margin-bottom:18px;align-items:flex-end;flex-wrap:wrap;gap:10px}
.format-rows{display:flex;flex-direction:column;gap:6px}
.format-row{
  display:grid;grid-template-columns:200px 1fr 110px;gap:14px;align-items:center;
  padding:10px 0;
}
.format-row .format-name .fn-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:2px}
.format-row .format-name .fn-sub{font-size:11px;color:rgba(255,255,255,.55);font-weight:600}
.format-row .bar-wrap{height:14px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;position:relative}
.format-row .bar{height:100%;border-radius:999px;background:var(--accent);transition:width .8s cubic-bezier(.2,.8,.2,1)}
.format-row .format-val{text-align:right}
.format-row .format-val .fv-num{font-size:18px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.format-row .format-val .fv-lbl{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;text-transform:uppercase;letter-spacing:.08em}
.format-take{
  font-size:11.5px;color:rgba(255,255,255,.6);font-weight:500;font-style:italic;
  padding:0 0 8px 14px;border-left:2px solid rgba(255,255,255,.15);margin-left:6px;
}
.format-note{
  margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1);
  font-size:12.5px;line-height:1.55;color:var(--vocus-teal);font-weight:600;
}

/* series mix */
.series-block{
  background:var(--vocus-blue-dark);
  border-radius:18px;padding:24px 28px;
}
.series-block .chart-head{display:flex;justify-content:space-between;margin-bottom:14px;align-items:flex-end;flex-wrap:wrap;gap:10px}
.series-rows{display:flex;flex-direction:column;gap:14px;margin-top:8px}
.series-row{display:grid;grid-template-columns:170px 1fr 80px;gap:14px;align-items:center}
.series-row .name{font-size:13px;font-weight:700}
.series-row .bar-wrap{height:14px;background:rgba(255,255,255,.1);border-radius:999px;overflow:hidden;position:relative}
.series-row .bar{height:100%;border-radius:999px;background:var(--accent);transition:width .8s cubic-bezier(.2,.8,.2,1)}
.series-row .val{font-size:13px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums}

/* ---------- FOOTER ---------- */
.footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:28px 64px;background:var(--vocus-blue-dark);color:#fff;
  font-size:11px;letter-spacing:.08em;font-weight:600;
}
.footer .right{opacity:.7}
.footer .footer-logo{display:flex;align-items:center;gap:14px}
.footer .footer-logo span{font-weight:600}

/* ---------- EDIT PANEL ---------- */
.edit-panel{
  position:fixed;top:0;right:0;height:100vh;width:480px;max-width:96vw;
  background:#0f1430;color:#fff;z-index:100;
  box-shadow:-30px 0 80px rgba(0,0,0,.5);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.2,.8,.2,1);
  display:flex;flex-direction:column;
}
.edit-panel.open{transform:translateX(0)}
.ep-head{padding:18px 22px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,.1)}
.ep-head h3{font-size:16px;font-weight:800}
.ep-head .x{background:transparent;color:#fff;font-size:18px;padding:6px 10px;border-radius:8px}
.ep-head .x:hover{background:rgba(255,255,255,.1)}
.ep-body{padding:18px 22px;overflow-y:auto;flex:1}
.ep-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.ep-toolbar button{
  padding:8px 12px;border-radius:8px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);
  display:inline-flex;align-items:center;gap:6px;
}
.ep-toolbar button:hover{background:rgba(255,255,255,.14)}
.ep-body details{margin-bottom:12px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.08)}
.ep-body summary{padding:12px 14px;cursor:pointer;font-weight:700;font-size:13px;list-style:none;display:flex;justify-content:space-between;align-items:center}
.ep-body summary::-webkit-details-marker{display:none}
.ep-body summary::after{content:"+";font-size:18px;font-weight:700;color:var(--vocus-teal)}
.ep-body details[open] summary::after{content:"–"}
.ep-body details > div{padding:0 14px 14px}
.ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ep-field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.ep-field label{font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.7;font-weight:700}
.ep-field input,.ep-field textarea,.ep-field select{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;
}
.ep-field input:focus,.ep-field textarea:focus{outline:2px solid var(--vocus-teal);outline-offset:0}
.ep-field textarea{min-height:60px;resize:vertical}
.ep-foot{padding:14px 22px;border-top:1px solid rgba(255,255,255,.1);display:flex;gap:10px}
.ep-foot button{padding:10px 16px;border-radius:8px;font-weight:700;font-size:13px}
.ep-foot .save{background:var(--vocus-teal);color:var(--vocus-blue-dark);flex:1}
.ep-foot .copy{background:rgba(255,255,255,.1);color:#fff}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:#0f1430;color:#fff;padding:12px 20px;border-radius:10px;
  border:1px solid rgba(255,255,255,.15);font-size:13px;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .3s;z-index:200;
}
.toast.show{opacity:1}

/* ---------- PRINT ---------- */
@page{size:A4 landscape;margin:0}
@media print{
  *,*::before,*::after{
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
    color-adjust:exact !important;
  }
  html,body{
    background:var(--vocus-blue) !important;margin:0;padding:0;
    -webkit-font-smoothing:antialiased;
    text-rendering:geometricPrecision;
  }
  img{image-rendering:auto !important}
  .logo img,.footer-logo img{
    image-rendering:auto !important;
    image-resolution:from-image;
    transform:none !important;
    -webkit-backface-visibility:visible !important;
  }
  .footer-logo img{height:28px !important}
  .toolbar,.edit-panel,.toast,.print-tip{display:none !important}
  .dashboard{
    width:100% !important;max-width:none !important;
    margin:0 !important;border-radius:0 !important;box-shadow:none !important;
    background:var(--vocus-blue) !important;

/* =========================================================
   CHART GENERATORS — pure SVG, brand styled
   ========================================================= */
function sparkline(values, colour, w=240, h=46){
  if (!values || values.length<2) return "";
  const min=Math.min(...values), max=Math.max(...values), span=max-min||1;
  const pts = values.map((v,i)=>{
    const x = (i/(values.length-1))*(w-4)+2;
    const y = h-4 - ((v-min)/span)*(h-12);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const line = `M ${pts[0]} L ${pts.join(" L ")}`;
  const lastX = (w-4)+2 - 2;
  const lastY = h-4 - ((values[values.length-1]-min)/span)*(h-12);
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none">
    <path d="${line}" fill="none" stroke="${colour}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.4" fill="${colour}"/>
  </svg>`;
}

function donutChart(segments, size=240, thickness=42){
  const cx = size/2, cy = size/2;
  const r = (size/2) - thickness/2 - 4;
  const total = segments.reduce((s,seg)=>s+(seg.value||0), 0) || 1;
  let cum = 0;
  const C = 2 * Math.PI * r;
  const arcs = segments.filter(s=>s.value>0).map((seg)=>{
    const frac = seg.value / total;
    const dash = frac * C;
    const offset = -cum * C;
    cum += frac;
    return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.colour}" stroke-width="${thickness}" stroke-dasharray="${dash} ${C-dash}" stroke-dashoffset="${offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
  }).join("");
  // center text — total
  const totalText = `<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">${fmt(total)}</text>
                     <text x="${cx}" y="${cy+16}" text-anchor="middle" fill="rgba(255,255,255,.6)" font-size="10" font-weight="700" letter-spacing="2">IMPRESSIONS</text>`;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">${arcs}${totalText}</svg>`;
}

function dualLineChart(journey, w=720, h=240){
  const labels = journey.labels;
  const series = journey.series.map(s=>{
    const start = s.values[0];
    const end = s.values[s.values.length-1];
    return {
      name: s.name, colour: s.colour, values: s.values, start, end,
      pcts: s.values.map(v => start ? ((v-start)/start)*100 : 0)
    };
  });
  const allPcts = series.flatMap(s=>s.pcts);
  const rawMax = Math.max(...allPcts, 1);
  const yMax = Math.ceil(rawMax/2)*2;  // round up to nearest 2%
  const padL=44, padR=92, padT=20, padB=36;
  const cw = w - padL - padR;
  const ch = h - padT - padB;

  const grid = [];
  for (let g=0;g<=4;g++){
    const y = padT + (ch*g/4);
    const v = yMax - (yMax*g/4);
    grid.push(`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(2,14,146,0.1)" stroke-width="1"/>`);
    grid.push(`<text x="${padL-8}" y="${y+4}" fill="#4E56B3" font-size="10" text-anchor="end" font-weight="600">${v.toFixed(0)}%</text>`);
  }

  const maxLabels = 8;
  const labelStep = Math.max(1, Math.ceil(labels.length / maxLabels));
  const xLabels = labels.map((l,i)=>{
    const show = i===0 || i===labels.length-1 || i % labelStep === 0;
    if (!show) return "";
    const x = padL + (i/(labels.length-1))*cw;
    return `<text x="${x}" y="${h-padB+18}" fill="#4E56B3" font-size="10.5" text-anchor="middle" font-weight="700">${l}</text>`;
  }).join("");

  const lines = series.map(s=>{
    const pts = s.pcts.map((p,i)=>{
      const x = padL + (i/(s.pcts.length-1))*cw;
      const y = padT + ch - (p/yMax)*ch;
      return [x,y];
    });
    const path = "M " + pts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" L ");
    const last = pts[pts.length-1];
    const endPct = s.pcts[s.pcts.length-1];
    return `
      <path d="${path}" fill="none" stroke="${s.colour}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="5" fill="${s.colour}" stroke="#fff" stroke-width="2"/>
      <text x="${last[0]+10}" y="${last[1]+4}" fill="${s.colour}" font-size="11" font-weight="800">+${endPct.toFixed(1)}%</text>
    `;
  }).join("");

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="display:block">
    ${grid.join("")}
    ${lines}
    ${xLabels}
  </svg>`;
}

function lineChartLarge(journey, w=720, h=260){
  const labels = journey.labels;
  const values = journey.values;
  const min = Math.min(...values)*0.998, max = Math.max(...values)*1.002, span = max-min||1;
  const padL=56, padR=20, padT=20, padB=36;
  const cw = w - padL - padR;
  const ch = h - padT - padB;

  const pts = values.map((v,i)=>{
    const x = padL + (i/(values.length-1))*cw;
    const y = padT + ch - ((v-min)/span)*ch;
    return [x,y];
  });
  const path = "M " + pts.map(p=>`${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" L ");

  const grid = [];
  for (let g=0;g<=4;g++){
    const y = padT + (ch*g/4);
    const v = max - (span*g/4);
    grid.push(`<line x1="${padL}" y1="${y}" x2="${w-padR}" y2="${y}" stroke="rgba(2,14,146,0.1)" stroke-width="1"/>`);
    grid.push(`<text x="${padL-8}" y="${y+4}" fill="#4E56B3" font-size="10" text-anchor="end" font-weight="600">${fmt(Math.round(v))}</text>`);
  }

  // Smart label spacing — show first, last, and ~6 in between
  const maxLabels = 10;
  const labelStep = Math.max(1, Math.ceil(labels.length / maxLabels));
  const xLabels = labels.map((l,i)=>{
    const showLabel = i === 0 || i === labels.length-1 || i % labelStep === 0;
    if (!showLabel) return "";
    const x = padL + (i/(labels.length-1))*cw;
    return `<text x="${x}" y="${h-padB+18}" fill="#4E56B3" font-size="10.5" text-anchor="middle" font-weight="700">${l}</text>`;
  }).join("");
  const dots = pts.map((p,i)=>{
    const isEnd = i === pts.length-1;
    const isStart = i === 0;
    const isLabelled = i % labelStep === 0;
    if (!isEnd && !isStart && !isLabelled) return "";
    return `<circle cx="${p[0]}" cy="${p[1]}" r="${isEnd?5:3}" fill="${isEnd?'#020E92':'#9A9FD3'}" stroke="#fff" stroke-width="${isEnd?2:1.5}"/>`;
  }).join("");

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="display:block">
    ${grid.join("")}
    <path d="${path}" fill="none" stroke="#020E92" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    ${dots}
    ${xLabels}
  </svg>`;
}

function render(){

  const dash = document.getElementById("dashboard");
  const totalMix = d.channelMix.reduce((s,m)=>s+m.value,0) || 1;

  dash.innerHTML = `

  <!-- ============ COVER ============ -->
  <section class="page cover">
    <div class="cover-header">
      <div class="logo"><img src="${LOGO_WHITE}" alt="Vocus"></div>
      <div class="report-meta">
        <strong>Social Media · Month in Review</strong><br>
        ${d.reportPeriod}<br>
        Prepared by Communications
      </div>
    </div>

    <div class="cover-hero">
      <div class="eyebrow">Connecting Australia's digital future</div>
      <h1 class="title">Australia's trusted<br>digital infrastructure <em>—</em></h1>
      <div class="cover-month">
        <span class="pill">${d.reportMonth}</span>
        ${d.isBaseline ? '<span class="pill baseline">First month · baseline</span>' : ""}
        <span style="opacity:.7;font-size:14px">LinkedIn · Instagram · YouTube</span>
      </div>
      <p class="cover-strapline">${d.strapline}</p>
    </div>

    <div class="hero-stats">
      ${d.hero.map(m=>{
        let metaHTML = "";
        if (!d.isBaseline && m.prev != null) {
          const p = pct(m.value, m.prev);
          if (p !== null) {
            const cls  = p > 0.5 ? "up" : p < -0.5 ? "down" : "flat";
            const arrow = p > 0.5 ? "▲" : p < -0.5 ? "▼" : "—";
            metaHTML = `<span class="delta ${cls}">${arrow} ${fmtPct(p)}</span><span style="opacity:.75">${d.prevMonthLabel || "vs last month"}</span>`;
          }
        } else if (m.showWithinMonth && m.startOfMonth){
          const diff = m.value - m.startOfMonth;
          const p = pct(m.value, m.startOfMonth);
          metaHTML = `<span class="delta up">▲ ${fmtSign(diff)}</span><span style="opacity:.75">${d.withinMonthLabel || "this month"}</span>`;
          if (p) metaHTML = `<span class="delta up">▲ ${fmtPct(p)}</span><span style="opacity:.75">${fmtSign(diff)} ${d.withinMonthLabel || "this month"}</span>`;
        } else if (d.isBaseline){
          metaHTML = `<span class="baseline-tag">Baseline</span>`;
        }
        return `<div class="stat" style="--accent:${m.accent}">
          <div class="label">${m.label}</div>
          <div class="num">${fmt(m.value)}</div>
          <div class="meta">${metaHTML}</div>
        </div>`;
      }).join("")}
    </div>

    <div class="metric-key">
      <div class="key-eyebrow">How to read this report</div>
      <div class="key-grid">
        <div class="key-item">
          <div class="key-term">Impressions</div>
          <div class="key-def">Times our content appeared on screen. <strong>1K = 1,000.</strong> For B2B LinkedIn, 1–3K solid · 5K+ excellent.</div>

function setByPath(obj, path, val){
  const parts = path.split(".");
  let cur = obj;
  for (let i=0;i<parts.length-1;i++){
    const k = parts[i];
    cur = cur[k];
  }
  cur[parts[parts.length-1]] = val;
}

function readEditPanel(){
  document.querySelectorAll("#editBody [data-path]").forEach(el=>{
    const path = el.dataset.path;
    const t = el.dataset.type;
    let v = el.value;
    if (t === "numarray") v = v.split(",").map(s=>parseFloat(s.trim())||0);
    else if (t === "strarray") v = v.split(",").map(s=>s.trim());
    else if (t === "bool") v = v === "true";
    else if (el.type === "number") v = parseFloat(v) || 0;
    setByPath(data, path, v);
  });
}

/* =========================================================
   WIRE UP
   ========================================================= */
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2600);
}

document.getElementById("editBtn").addEventListener("click", ()=>{
  buildEditPanel();
  document.getElementById("editPanel").classList.add("open");
});
document.getElementById("closeEditBtn").addEventListener("click", ()=>{
  document.getElementById("editPanel").classList.remove("open");
});
document.getElementById("saveDataBtn").addEventListener("click", ()=>{
  readEditPanel();
  render();
  document.getElementById("editPanel").classList.remove("open");
  showToast("Dashboard updated");
});
document.getElementById("copyJsonBtn").addEventListener("click", async ()=>{
  readEditPanel();
  try{
    await navigator.clipboard.writeText(JSON.stringify(data, null, 2));
    showToast("JSON copied to clipboard");
  }catch(e){
    showToast("Copy failed — your browser blocked clipboard");
  }
});
document.getElementById("printBtn").addEventListener("click", ()=>{
  document.getElementById("printTip").classList.add("show");
});
document.getElementById("ptCancel").addEventListener("click", ()=>{
  document.getElementById("printTip").classList.remove("show");
});
document.getElementById("ptGo").addEventListener("click", ()=>{
  document.getElementById("printTip").classList.remove("show");
  setTimeout(()=>window.print(), 100);
});

document.getElementById("fileInput").addEventListener("change", (e)=>{
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const loaded = JSON.parse(ev.target.result);
      Object.keys(loaded).forEach(k=>{ data[k] = loaded[k]; });
      buildEditPanel();
      render();
      showToast(`Loaded ${file.name}`);
    }catch(err){
      showToast("That file isn't valid JSON");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
});

render();
</script>
</body>
</html>
